name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  # Stage 1: Lint & Format
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check

      - name: Run lint
        run: npm run lint

  # Stage 2: Type Check
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [lint-and-format]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  # Stage 3: Unit Tests with Coverage Gate
  unit-tests:
    name: Unit Tests (80% Coverage Gate)
    runs-on: ubuntu-latest
    needs: [type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Stage 4: CDK Synth & CDK Nag
  cdk-synth:
    name: CDK Synth & CDK Nag
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Infrastructure
        working-directory: ./infra
        run: npm run build

      - name: CDK Synth with CDK Nag
        working-directory: ./infra
        run: |
          # CDK Nag runs during synth via Aspects in app.ts
          # Error-level findings will fail synth automatically (exit code)
          npx cdk synth 2>&1 | tee synth-output.log
          CDK_EXIT_CODE=${PIPESTATUS[0]}

          # Check if no stacks defined (exit code 1 is expected in this case)
          if grep -q "This app contains no stacks" synth-output.log; then
            echo "ℹ️ No stacks defined yet - CDK Nag will run when stacks are added"
            exit 0
          fi

          # Verify CDK Nag is configured by checking compiled app.js
          if grep -q "AwsSolutionsChecks\|cdk-nag" dist/bin/app.js; then
            echo "✅ CDK Nag is configured in app.ts"
            # Check for CDK Nag findings in output
            if grep -q "AwsSolutions" synth-output.log; then
              echo "⚠️  CDK Nag found issues (see output above)"
              # Non-error findings won't fail synth, but we report them
            else
              echo "✅ No CDK Nag findings - all stacks are compliant"
            fi
          else
            echo "❌ CDK Nag is not configured in app.ts - check bin/app.ts"
            exit 1
          fi

          # Check CDK synth exit code (CDK Nag errors will fail synth)
          if [ $CDK_EXIT_CODE -ne 0 ]; then
            echo "❌ CDK synth failed (possibly due to CDK Nag ERROR-level findings)"
            exit $CDK_EXIT_CODE
          fi

  # Stage 5: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [cdk-synth]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: |
          # Placeholder for integration tests
          # Will be implemented as integration test suite grows
          echo "✅ Integration tests placeholder - ready for implementation"

  # Stage 6: Contract Tests
  contract-tests:
    name: Contract Tests (OpenAPI)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: |
          # Placeholder for contract tests
          # Will validate API contracts against OpenAPI spec when spec is ready
          echo "✅ Contract tests placeholder - awaiting OpenAPI spec"

  # Stage 7: Agent-Specific Security Scanning
  security-scan:
    name: Security Scanning (Agent-Enhanced)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency Vulnerability Scan (npm audit)
        continue-on-error: true
        run: |
          # Report high/critical vulnerabilities in production dependencies.
          # continue-on-error: true ensures downstream security steps (secrets
          # detection, SAST) still run when transitive dependency vulns exist
          # that we cannot fix directly (e.g., CVE-2026-26278 in fast-xml-parser
          # via @aws-sdk). The job will show as yellow (warning) not red.
          npm audit --audit-level=high --omit=dev
          echo "✅ No high or critical vulnerabilities found in production dependencies"

      - name: Secrets Detection
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: SAST with ESLint Security Plugin
        run: |
          # Note: Lint runs here again for SAST context (security rules + custom import guards)
          # First run (lint-and-format job) validates code style/quality
          # This run provides security-focused context for audit trail
          npm run lint
          echo "✅ SAST checks completed via ESLint"

      - name: Agent Code Security Notice
        run: |
          echo "🤖 Agent-Generated Code Security Notice (FR79)"
          echo "Per PRD, AI-assisted code has 3x vulnerability rate"
          echo "All findings above should be reviewed with extra scrutiny"
          echo "Security thresholds configured accordingly"

  # Stage 8: Deploy to Dev (Conditional)
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [contract-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate AWS Credentials Configured
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "❌ AWS_ROLE_ARN secret not configured"
            echo "ℹ️ Deploying to main branch requires AWS credentials"
            echo "ℹ️ Configure AWS_ROLE_ARN secret with OIDC role ARN"
            echo "ℹ️ See: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services"
            exit 1
          fi
          echo "✅ AWS credentials configuration validated"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Build shared packages
        run: npm run build

      - name: Build Infrastructure
        working-directory: ./infra
        run: npm run build

      - name: Deploy Infrastructure
        working-directory: ./infra
        run: |
          echo "🚀 Deploying to Dev environment"
          npx cdk deploy --all --require-approval never

  # Stage 9: E2E Tests (6 Persona Paths)
  e2e-tests:
    name: E2E Tests (6 Persona Paths)
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: |
          echo "🧪 E2E Test Placeholder - 6 Persona Golden Paths"
          echo ""
          echo "Planned persona paths:"
          echo "  1. New User Onboarding (signup → first save → first project)"
          echo "  2. Mobile Quick Save (iOS Shortcut capture)"
          echo "  3. Resource Discovery (search → filter → view)"
          echo "  4. Project Builder (create project → link resources → notes)"
          echo "  5. Tutorial Learner (mark tutorial → track progress → complete)"
          echo "  6. Power User (API key → programmatic saves → bulk operations)"
          echo ""
          echo "✅ E2E placeholder ready - tests will run against deployed dev environment"

  # Stage 10: Deploy to Prod (Manual Approval)
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://ai-learning-hub.example.com
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate AWS Credentials Configured
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN_PROD }}" ]; then
            echo "❌ AWS_ROLE_ARN_PROD secret not configured"
            echo "ℹ️ Production deployment requires AWS credentials"
            echo "ℹ️ Configure AWS_ROLE_ARN_PROD secret with OIDC role ARN"
            echo "ℹ️ See: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services"
            exit 1
          fi
          echo "✅ AWS credentials configuration validated"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-2

      - name: Build shared packages
        run: npm run build

      - name: Build Infrastructure
        working-directory: ./infra
        run: npm run build

      - name: Deploy to Production
        working-directory: ./infra
        run: |
          echo "🚀 Deploying to Production environment"
          npx cdk deploy --all --require-approval never

  # Review Gate: Block story PRs without completed code review
  review-gate:
    name: Code Review Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check review gate
        env:
          BRANCH: ${{ github.head_ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          # Skip for non-story branches
          if [[ ! "$BRANCH" =~ ^story- ]]; then
            echo "✅ Non-story branch — review gate not required"
            exit 0
          fi

          # Skip if override label present
          if [[ "$LABELS" == *"skip-review-gate"* ]]; then
            echo "⚠️ Review gate skipped via label"
            exit 0
          fi

          # Extract story ID from branch: story-3-5-1-description → 3-5-1
          STORY_ID=$(echo "$BRANCH" | sed -E 's/^story-([0-9]+[-_.][0-9]+([-_.][0-9]+)?(-[A-Z][0-9]+)?).*/\1/')

          # Normalize: dots → hyphens for file matching
          STORY_ID_NORMALIZED=$(echo "$STORY_ID" | tr '.' '-')

          # Also keep original for dot-format files
          STORY_ID_DOTS=$(echo "$STORY_ID" | tr '-' '.')

          # Search for findings files (both formats)
          FINDINGS=$(ls docs/progress/story-${STORY_ID_NORMALIZED}-review-findings*.md \
                        docs/progress/story-${STORY_ID_DOTS}-review-findings*.md 2>/dev/null | sort -u | tail -1)

          if [ -z "$FINDINGS" ]; then
            echo "❌ REVIEW GATE FAILED"
            echo ""
            echo "No review findings file found for Story ${STORY_ID}"
            echo "Expected: docs/progress/story-${STORY_ID_NORMALIZED}-review-findings-round-N.md"
            echo ""
            echo "The adversarial code review must complete before this PR can merge."
            echo "Run the review loop via /bmad-bmm-auto-epic or /bmad-bmm-code-review."
            echo ""
            echo "To override: add the 'skip-review-gate' label (requires justification)."
            exit 1
          fi

          echo "📄 Found review findings: $FINDINGS"

          # Parse latest findings for MUST-FIX count
          CRITICAL=$(grep -oE '\*\*Critical:\*\*[[:space:]]*[0-9]+' "$FINDINGS" | grep -oE '[0-9]+$' | tail -1)
          IMPORTANT=$(grep -oE '\*\*Important:\*\*[[:space:]]*[0-9]+' "$FINDINGS" | grep -oE '[0-9]+$' | tail -1)

          CRITICAL=${CRITICAL:-0}
          IMPORTANT=${IMPORTANT:-0}

          MUST_FIX=$((CRITICAL + IMPORTANT))

          if [ "$MUST_FIX" -gt 0 ]; then
            echo ""
            echo "❌ REVIEW GATE FAILED — ${MUST_FIX} unresolved MUST-FIX findings"
            echo "   Critical: ${CRITICAL}"
            echo "   Important: ${IMPORTANT}"
            echo "   File: ${FINDINGS}"
            echo ""
            echo "Fix these findings and run another review round before merging."
            exit 1
          fi

          echo "✅ Review gate passed — 0 MUST-FIX findings (Critical: ${CRITICAL}, Important: ${IMPORTANT})"
